<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alem Expert Router</title>
<style>
  :root {
    --bg: oklch(98% 0.005 265); --surface: oklch(100% 0 0);
    --ink: oklch(22% 0.03 265); --muted: oklch(55% 0.02 265);
    --line: oklch(91% 0.012 265); --accent: oklch(55% 0.18 277);
    --accent-d: oklch(48% 0.2 277); --soft: oklch(96% 0.03 277);
    --ok: oklch(60% 0.15 150); --ok-soft: oklch(95% 0.05 150);
    --warn: oklch(70% 0.15 55); --warn-soft: oklch(96% 0.05 60);
    --danger: oklch(58% 0.2 25);
    --radius: 14px; --shadow: 0 1px 2px oklch(0% 0 0/.04), 0 10px 26px oklch(0% 0 0/.06);
    --ease: cubic-bezier(.16,1,.3,1);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); line-height: 1.5; }
  h1,h2,h3 { letter-spacing: -.01em; }

  header.top { position: sticky; top: 0; z-index: 5; display: flex; align-items: center;
    gap: 1.2rem; padding: .8rem 1.4rem; background: oklch(100% 0 0/.85);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: .6rem; margin-right: .4rem; }
  .logo { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center;
    background: linear-gradient(135deg, var(--accent), oklch(58% .19 300)); color: #fff;
    font-weight: 800; }
  .brand b { font-size: 1rem; }
  nav.tabs { display: flex; gap: .25rem; }
  nav.tabs button { font: inherit; font-weight: 600; border: 0; background: transparent;
    color: var(--muted); padding: .5rem .9rem; border-radius: 9px; cursor: pointer;
    transition: background 150ms, color 150ms; }
  nav.tabs button:hover { background: var(--soft); color: var(--ink); }
  nav.tabs button.on { background: var(--accent); color: #fff; }
  .spacer { flex: 1; }

  button.btn { font: inherit; font-weight: 600; cursor: pointer; border-radius: 10px;
    padding: .55rem 1rem; border: 1px solid var(--line); background: var(--surface);
    color: var(--ink); transition: transform var(--ease) 150ms, box-shadow 150ms, background 150ms; }
  button.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  button.btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
  button.btn.ai { background: var(--soft); color: var(--accent-d); border-color: transparent; }
  button.btn.sm { padding: .35rem .7rem; font-size: .82rem; border-radius: 8px; }

  main { max-width: 1140px; margin: 0 auto; padding: 1.4rem; }
  .card { background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); }
  .card h2 { font-size: .78rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin: 0; padding: 1rem 1.1rem .3rem; }

  /* --- распределение --- */
  .grid { display: grid; grid-template-columns: 320px 1fr; gap: 1.4rem; align-items: start; }
  @media (max-width: 860px){ .grid{ grid-template-columns: 1fr; } }
  .stats { display: flex; gap: .8rem; padding: .5rem 1.1rem 1.1rem; }
  .stat b { display: block; font-size: 1.9rem; line-height: 1.1; }
  .stat span { font-size: .76rem; color: var(--muted); }
  .mentor { padding: .45rem 1.1rem; }
  .mentor:last-child { padding-bottom: 1rem; }
  .mentor .row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: .28rem; }
  .mentor .role { font-size: .72rem; color: var(--muted); }
  .bar { height: 8px; background: var(--soft); border-radius: 99px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 99px;
    transform-origin: left; transform: scaleX(0); transition: transform 700ms var(--ease); }
  .assign { padding: .3rem .6rem 1rem; }
  .item { display: grid; grid-template-columns: auto 1fr; gap: .9rem; padding: .85rem .6rem;
    border-bottom: 1px solid var(--line); }
  .item:last-child { border-bottom: 0; }
  .score { width: 50px; height: 50px; border-radius: 12px; display: grid; place-items: center;
    background: var(--soft); color: var(--accent-d); font-weight: 800; }
  .item h3 { margin: 0 0 .12rem; font-size: 1rem; }
  .who { font-size: .85rem; color: var(--muted); margin-bottom: .4rem; }
  .who b { color: var(--ink); }
  .reasons { list-style: none; margin: 0; padding: 0; display: grid; gap: .18rem; }
  .reasons li { font-size: .82rem; color: var(--muted); padding-left: 1.1rem; position: relative; }
  .reasons li::before { content: "✓"; position: absolute; left: 0; color: var(--ok); font-weight: 700; }
  .pill { font-size: .68rem; font-weight: 700; padding: .12rem .5rem; border-radius: 99px; }
  .pill.hi { background: var(--warn-soft); color: var(--warn); }
  .unassigned { padding: .3rem 1.1rem 1.1rem; }
  .u { display: flex; gap: .5rem; font-size: .85rem; padding: .35rem 0; border-bottom: 1px dashed var(--line); }
  .u:last-child { border-bottom: 0; } .u .x { color: var(--warn); font-weight: 800; }
  .u em { color: var(--muted); font-style: normal; }

  /* --- списки/формы --- */
  .split { display: grid; grid-template-columns: 380px 1fr; gap: 1.4rem; align-items: start; }
  @media (max-width: 860px){ .split{ grid-template-columns: 1fr; } }
  form { padding: .4rem 1.1rem 1.1rem; display: grid; gap: .7rem; }
  label { font-size: .8rem; font-weight: 600; color: var(--muted); display: grid; gap: .3rem; }
  input, select, textarea { font: inherit; padding: .55rem .7rem; border: 1px solid var(--line);
    border-radius: 10px; background: var(--surface); color: var(--ink); width: 100%; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--soft); border-color: var(--accent); }
  textarea { resize: vertical; min-height: 64px; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
  .chips { display: flex; flex-wrap: wrap; gap: .35rem; min-height: 1.4rem; }
  .chip { font-size: .78rem; font-weight: 600; padding: .2rem .55rem; border-radius: 99px;
    background: var(--soft); color: var(--accent-d); }
  .method { font-size: .72rem; color: var(--muted); }
  .picker { display: grid; gap: .6rem; }
  .palette { display: flex; flex-wrap: wrap; gap: .4rem; }
  .sk { font: inherit; font-size: .85rem; font-weight: 600; padding: .5rem .8rem; border-radius: 99px;
    border: 1px solid var(--line); background: var(--surface); color: var(--muted); cursor: pointer;
    transition: background 120ms, color 120ms; }
  .sk.on { background: var(--accent); color: #fff; border-color: transparent; }
  .chosen { display: grid; gap: .45rem; }
  .ch { display: flex; align-items: center; gap: .6rem; padding: .45rem .6rem; background: var(--soft);
    border-radius: 11px; flex-wrap: wrap; }
  .ch > span { font-weight: 700; font-size: .88rem; color: var(--ink); min-width: 86px; }
  .lv { display: flex; gap: .3rem; }
  .dot { width: 26px; height: 26px; border-radius: 7px; border: 1px solid var(--line);
    background: var(--surface); cursor: pointer; padding: 0; font-size: .7rem; color: var(--muted); }
  .dot.f { background: var(--accent); border-color: transparent; color: #fff; }
  .ch .rm { margin-left: auto; color: var(--danger); background: 0; border: 0; cursor: pointer; font-size: 1rem; }
  .list { display: grid; gap: .7rem; }
  .row-card { display: flex; align-items: center; gap: .9rem; padding: .85rem 1rem;
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px; }
  .row-card .av { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center;
    background: var(--soft); color: var(--accent-d); font-weight: 800; flex: none; }
  .row-card .meta { flex: 1; min-width: 0; }
  .row-card .meta b { font-size: .98rem; }
  .row-card .meta .sub { font-size: .8rem; color: var(--muted); }
  .del { color: var(--danger); background: transparent; border: 0; cursor: pointer; font-size: 1.1rem;
    padding: .2rem .4rem; border-radius: 8px; }
  .del:hover { background: oklch(95% .04 25); }
  .empty { padding: 1.4rem; text-align: center; color: var(--muted); }
  .row-card { transition: transform var(--ease) 150ms, box-shadow var(--ease) 150ms; }
  .row-card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  #toast.toast { position: fixed; left: 50%; bottom: 1.5rem; transform: translate(-50%, 2rem);
    padding: .7rem 1.2rem; border-radius: 12px; font-weight: 600; font-size: .9rem; color: #fff;
    box-shadow: var(--shadow); opacity: 0; pointer-events: none; z-index: 50;
    transition: opacity 280ms var(--ease), transform 280ms var(--ease); }
  #toast.toast.show { opacity: 1; transform: translate(-50%, 0); }
  #toast.toast.err { background: var(--danger); }
  #toast.toast.ok { background: var(--ok); }
  .brand .tag { font-size: .72rem; color: var(--muted); font-weight: 500; margin-top: 1px; }
  nav.tabs .cnt { display: inline-grid; place-items: center; min-width: 1.2rem; height: 1.2rem;
    padding: 0 .35rem; margin-left: .25rem; border-radius: 99px; font-size: .72rem;
    background: var(--soft); color: var(--accent-d); }
  nav.tabs button.on .cnt { background: oklch(100% 0 0 / .25); color: #fff; }
  .guide { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 1rem 1.2rem; margin-bottom: 1.4rem; }
  .guide .hd { font-weight: 700; font-size: .95rem; margin-bottom: .55rem; }
  .guide .steps { display: flex; gap: 1rem; flex-wrap: wrap; }
  .guide .step { flex: 1; min-width: 210px; font-size: .88rem; color: var(--muted); }
  .guide .step b { color: var(--accent-d); margin-right: .15rem; }
  .guide a { color: var(--accent); font-weight: 600; cursor: pointer; text-decoration: none; }
  .guide a:hover { text-decoration: underline; }
  .hidden { display: none !important; }

  /* --- метрики эффекта --- */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: .8rem; margin-bottom: 1.4rem; }
  .metric { background: var(--surface); border: 1px solid var(--line); padding: 1rem;
    border-radius: var(--radius); text-align: center; box-shadow: var(--shadow); }
  .metric-val { font-size: 1.35rem; font-weight: 800; color: var(--accent); line-height: 1.15; }
  .metric-label { font-size: .76rem; color: var(--muted); margin-top: .28rem; }
  @media (max-width: 600px) { .metrics { grid-template-columns: repeat(2, 1fr); } }

  /* --- частичное / ручное назначение --- */
  .item.partial { border-left: 3px solid var(--warn); padding-left: .6rem; }
  .item.manual  { border-left: 3px solid var(--accent); padding-left: .6rem; }
  .pill.warn { background: var(--warn-soft); color: var(--warn); }
  .pill.man  { background: var(--soft); color: var(--accent-d); }
  .reasons li.warn::before { content: "⚠"; color: var(--warn); }
  .u { align-items: center; }
  .u .grow { flex: 1; }
  button.btn.tiny { padding: .3rem .65rem; font-size: .78rem; border-radius: 8px; }

  /* --- модалка выбора эксперта (ручное назначение) --- */
  .modal-bg { position: fixed; inset: 0; background: oklch(0% 0 0 / .35); display: grid;
    place-items: center; z-index: 60; padding: 1rem; }
  .modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
    max-width: 460px; width: 100%; max-height: 80vh; overflow: auto; padding: 1.2rem; }
  .modal h3 { margin: 0 0 .2rem; }
  .modal .sub { font-size: .82rem; color: var(--muted); margin-bottom: .8rem; }
  .pick { display: flex; align-items: center; gap: .7rem; width: 100%; text-align: left;
    padding: .6rem .7rem; border: 1px solid var(--line); border-radius: 11px; background: var(--surface);
    cursor: pointer; margin-bottom: .5rem; font: inherit; transition: background 120ms; }
  .pick:hover { background: var(--soft); }
  .pick .av { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center;
    background: var(--soft); color: var(--accent-d); font-weight: 800; flex: none; }
  .pick .pmeta { flex: 1; min-width: 0; }
  .pick .pmeta b { font-size: .92rem; }
  .pick .pmeta .ps { font-size: .76rem; color: var(--muted); }
  .modal .close { margin-top: .4rem; width: 100%; }
</style>
</head>
<body>
  <header class="top">
    <div class="brand"><div class="logo">A</div><div><b>Alem Expert Router</b><div class="tag">Автоматическое распределение заявок по исполнителям</div></div></div>
    <nav class="tabs">
      <button data-tab="assign" class="on">Распределение</button>
      <button data-tab="requests">Заявки <span class="cnt" id="cntReq"></span></button>
      <button data-tab="experts">Эксперты <span class="cnt" id="cntExp"></span></button>
      <button data-tab="announcements">Объявления <span class="cnt" id="cntAnn"></span></button>
    </nav>
    <div class="spacer"></div>
    <button class="btn sm" id="seedBtn">Демо-данные</button>
  </header>

  <main>
    <!-- ===== РАСПРЕДЕЛЕНИЕ ===== -->
    <section id="view-assign">
      <div id="guide" class="guide"></div>
      <div id="metrics" class="metrics"></div>
      <div class="grid">
      <aside style="display:grid; gap:1.4rem;">
        <section class="card"><h2>Сводка</h2>
          <div class="stats">
            <div class="stat"><b id="matched">—</b><span>назначено</span></div>
            <div class="stat"><b id="total">—</b><span>заявок</span></div>
            <div class="stat"><b id="rate">—</b><span>покрытие</span></div>
          </div>
        </section>
        <section class="card"><h2>Загрузка исполнителей</h2><div id="mentors"></div></section>
        <section class="card hidden" id="unassignedCard"><h2>Без исполнителя</h2>
          <div class="unassigned" id="unassigned"></div></section>
      </aside>
      <section class="card"><h2>Назначения с объяснением</h2>
        <div class="assign" id="assignments"></div></section>
      </div>
    </section>

    <!-- ===== ЗАЯВКИ ===== -->
    <section id="view-requests" class="split hidden">
      <section class="card"><h2>Новая заявка</h2>
        <form id="reqForm">
          <label>Название
            <input id="rTitle" required placeholder="Чат-бот поддержки студентов" /></label>
          <label>Опиши задачу словами — компетенции распознаются по ключевым словам
            <textarea id="rText" placeholder="Нужен ассистент по базе знаний на Python с элементами ML…"></textarea></label>
          <button type="button" class="btn ai" id="parseBtn">🔍 Распознать компетенции (по ключевым словам)</button>
          <div class="method" id="rMethod"></div>
          <label>Требуемые компетенции — нажми, чтобы выбрать
            <div class="picker" id="rPicker"></div></label>
          <label>Приоритет
            <select id="rPriority">
              <option value="5">5 — наивысший</option><option value="4">4 — высокий</option>
              <option value="3" selected>3 — средний</option><option value="2">2 — низкий</option>
              <option value="1">1 — минимальный</option>
            </select></label>
          <button class="btn primary" type="submit">Добавить заявку</button>
        </form>
      </section>
      <section class="card"><h2>Заявки</h2><div class="list" id="reqList" style="padding:.4rem 1.1rem 1.1rem"></div></section>
    </section>

    <!-- ===== ЭКСПЕРТЫ ===== -->
    <section id="view-experts" class="split hidden">
      <section class="card"><h2>Новый исполнитель</h2>
        <form id="expForm">
          <label>Имя <input id="eName" required placeholder="Айгерим" /></label>
          <label>Роль
            <select id="eRole"><option value="expert">эксперт</option>
              <option value="mentor">ментор</option><option value="freelancer">фрилансер</option></select></label>
          <div class="two">
            <label>Ёмкость <input id="eCap" type="number" min="1" value="3" /></label>
            <label>Рейтинг <input id="eRating" type="number" min="0" max="5" step="0.1" value="4.5" /></label>
          </div>
          <label>Навыки — нажми, чтобы выбрать
            <div class="picker" id="ePicker"></div></label>
          <button class="btn primary" type="submit">Добавить исполнителя</button>
        </form>
      </section>
      <section class="card"><h2>Исполнители</h2><div class="list" id="expList" style="padding:.4rem 1.1rem 1.1rem"></div></section>
    </section>

    <!-- ===== ОБЪЯВЛЕНИЯ ===== -->
    <section id="view-announcements" class="split hidden">
      <section class="card"><h2>Новое объявление</h2>
        <form id="annForm">
          <label>Тема <input id="annTitle" required placeholder="Требуется ментор по Data Science" /></label>
          <label>Описание <textarea id="annBody" rows="3" required placeholder="Кому адресовано, что нужно, сроки…"></textarea></label>
          <label>Тип
            <select id="annType">
              <option value="expert_needed">Поиск эксперта</option>
              <option value="task_available">Доступная задача</option>
              <option value="event">Мероприятие</option>
            </select></label>
          <button class="btn primary" type="submit">Опубликовать</button>
        </form>
      </section>
      <section class="card"><h2>Лента объявлений</h2><div class="list" id="annList" style="padding:.4rem 1.1rem 1.1rem"></div></section>
    </section>
  </main>
<script>
/* Клиентская версия для GitHub Pages: логика матчинга и AI-извлечения
   перенесены в браузер (зеркало app/matching.py и app/ai.py). Данные — в
   localStorage. Полная версия с FastAPI-бэком, БД и LLM — в репозитории. */
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const uid = p => p + (crypto.randomUUID ? crypto.randomUUID().slice(0,8) : Date.now().toString(36));
function notify(msg, ok=false){ let n=document.getElementById("toast"); if(!n){n=document.createElement("div");n.id="toast";document.body.appendChild(n);} n.textContent=msg; n.className="toast "+(ok?"ok":"err"); requestAnimationFrame(()=>n.classList.add("show")); clearTimeout(n._t); n._t=setTimeout(()=>n.classList.remove("show"),2800); }
const parseSkills = str => { const o={}; (str||"").split(",").forEach(p=>{ const m=p.trim().match(/^(.+?)\s*[:=]\s*(\d)$/); if(m){const l=+m[2]; if(l>=1) o[m[1].trim().toLowerCase()]=Math.min(5,l);} }); return o; };
const skillStr = sk => Object.entries(sk).map(([k,v])=>`${k} ${v}`).join(" · ");

/* ---- пикер навыков (кнопки + уровни 1..5) ---- */
const SKILLS = ["python","fastapi","django","react","typescript","sql","ml","data","nlp","devops","docker","flutter","ui"];
function makePicker(id){
  const state={}; const el=document.getElementById(id);
  function render(){
    el.innerHTML = `<div class="palette">${SKILLS.map(s=>`<button type="button" class="sk${s in state?" on":""}" data-s="${s}">${s}</button>`).join("")}</div>`
      + (Object.keys(state).length ? `<div class="chosen">${Object.entries(state).map(([s,l])=>`<div class="ch"><span>${esc(s)}</span><div class="lv">${[1,2,3,4,5].map(n=>`<button type="button" class="dot${n<=l?" f":""}" data-s="${s}" data-l="${n}">${n}</button>`).join("")}</div><button type="button" class="rm" data-rm="${s}">✕</button></div>`).join("")}</div>` : "");
    el.querySelectorAll(".sk").forEach(b=>b.onclick=()=>{ const s=b.dataset.s; (s in state)?delete state[s]:state[s]=3; render(); });
    el.querySelectorAll(".dot").forEach(b=>b.onclick=()=>{ state[b.dataset.s]=+b.dataset.l; render(); });
    el.querySelectorAll(".rm").forEach(b=>b.onclick=()=>{ delete state[b.dataset.rm]; render(); });
  }
  render();
  return { get:()=>({...state}), set:o=>{ for(const k in state) delete state[k]; Object.assign(state,o); render(); }, clear:()=>{ for(const k in state) delete state[k]; render(); } };
}
const reqPicker = makePicker("rPicker");
const expPicker = makePicker("ePicker");

/* ---- AI: извлечение компетенций по таксономии (как app/ai.py) ---- */
const TAXONOMY = {python:["python","питон"],fastapi:["fastapi","фастапи"],django:["django","джанго"],react:["react","реакт"],typescript:["typescript","тайпскрипт"],sql:["sql","postgres","база данных","бд","запрос"],ml:["ml","machine learning","машинн","модел","обучени"],data:["data engineer","данны","аналитик","etl","пайплайн"],nlp:["nlp","llm","чат-бот","чатбот","распознавани","текст","язык"],devops:["devops","ci/cd","деплой","kubernetes","k8s"],docker:["docker","докер","контейнер"],flutter:["flutter","флаттер"],ui:["ui","ux","интерфейс","вёрстк","верстк","frontend","фронт"]};
const NEG=/(^|[^а-яёa-z])(не|без|нет|никак|исключ)/i;
function isNegated(low,pos){ return NEG.test(low.slice(Math.max(0,pos-25),pos)); }
function extractSkills(text){ const low=text.toLowerCase();
  const lvl=/увере|эксперт|senior|глубок|сильн|advanced|продвинут/i.test(low)?4:(/базов|junior|основ|начальн|джун/i.test(low)?2:3);
  const o={}; for(const[s,t]of Object.entries(TAXONOMY)){ for(const x of t){ const pos=low.indexOf(x); if(pos!==-1&&!isNegated(low,pos)){ o[s]=lvl; break; } } } return o; }

/* ---- демо-данные + состояние (localStorage) ---- */

/* ---- матчинг (зеркало app/matching.py) ----
   ГЛОБАЛЬНЫЙ оптимум через венгерский алгоритм (задача о назначениях), а не
   жадный перебор. Эксперт с ёмкостью N даёт N «слотов». Если полное покрытие
   невозможно — допускается частичное (со штрафом). */
const W={competency:.6,load:.25,rating:.15};

function score(e,r,partial=false,maxCap=1){
  if(!e.available) return null;
  const free=e.capacity-e.current_load; if(free<=0) return null;
  const det=[],missing=[]; const entries=Object.entries(r.required_skills); let anyHit=0;
  for(const[s,m]of entries){ const h=e.skills[s]||0;
    if(h>=m){ det.push(`${s} (${h}≥${m})`); anyHit++; }
    else if(partial&&h>0){ det.push(`${s} (${h}/${m}, частично)`); missing.push(`${s} (${h}<${m})`); anyHit++; }
    else if(partial){ missing.push(`${s} (отсутствует)`); }
    else return null; // строгий режим: один промах — отказ
  }
  // частичное допускается, только если есть хоть какое-то реальное пересечение
  if(partial&&anyHit===0) return null;
  // компетентность: доля покрытия уровня, усреднённая по требуемым навыкам
  const comp=entries.length? entries.reduce((a,[s,m])=>a+Math.min(e.skills[s]||0,m)/m,0)/entries.length : .5;
  const loadBal=Math.min(free/Math.max(maxCap,1),1); // абсолютная свободная ёмкость, нормированная по пулу
  const tw=W.competency+W.load+W.rating;
  const penalty=partial?Math.min(missing.length*0.08,0.6):0;
  const sc=Math.round((W.competency*comp+W.load*loadBal+W.rating*(e.rating/5))/tw*(1-penalty)*1000)/10;
  const reasons=[`Покрывает навыки: ${det.join(", ")}`,`Загрузка ${e.current_load}/${e.capacity} — свободно ${free}`,`Рейтинг ${e.rating}/5`,`Роль: ${e.role}`];
  if(missing.length) reasons.push(`⚠ Частичное покрытие: ${missing.join(", ")}`);
  return {e,score:sc,partial,missing:missing.length,reasons}; }

function explainNo(r,pool){ const sk=pool.filter(e=>Object.entries(r.required_skills).every(([s,l])=>(e.skills[s]||0)>=l));
  if(!sk.length) return `Нет исполнителя с компетенциями: ${Object.entries(r.required_skills).map(([s,l])=>`${s}≥${l}`).join(", ")}`;
  if(!sk.some(e=>e.available)) return "Все подходящие исполнители помечены как недоступны";
  return "Все подходящие исполнители заняты (нет свободной ёмкости)"; }

/* Венгерский алгоритм (минимизация), прямоугольная матрица -> col для каждой row или -1 */
function hungarian(cost){
  const nR=cost.length; if(!nR) return []; const nC=cost[0].length; if(!nC) return new Array(nR).fill(-1);
  const n=Math.max(nR,nC); const BIG=Math.max(...cost.flat(),0)+1;
  const a=Array.from({length:n},(_,i)=>Array.from({length:n},(_,j)=>(i<nR&&j<nC)?cost[i][j]:BIG));
  const INF=Infinity, u=new Array(n+1).fill(0), v=new Array(n+1).fill(0), p=new Array(n+1).fill(0), way=new Array(n+1).fill(0);
  for(let i=1;i<=n;i++){ p[0]=i; let j0=0; const minv=new Array(n+1).fill(INF), used=new Array(n+1).fill(false);
    do{ used[j0]=true; const i0=p[j0]; let delta=INF,j1=-1;
      for(let j=1;j<=n;j++) if(!used[j]){ const cur=a[i0-1][j-1]-u[i0]-v[j]; if(cur<minv[j]){minv[j]=cur;way[j]=j0;} if(minv[j]<delta){delta=minv[j];j1=j;} }
      for(let j=0;j<=n;j++){ if(used[j]){u[p[j]]+=delta;v[j]-=delta;} else minv[j]-=delta; }
      j0=j1; }while(p[j0]!==0);
    do{ const j1=way[j0]; p[j0]=p[j1]; j0=j1; }while(j0); }
  const res=new Array(nR).fill(-1);
  for(let j=1;j<=n;j++){ const i=p[j]; if(i>=1&&i<=nR&&(j-1)<nC) res[i-1]=j-1; }
  return res; }

function assignAll(){
  const pool=clone(state.experts);
  const total=state.requests.length;
  const maxCap=Math.max(1,...pool.map(e=>e.capacity));
  // приоритет ↓, дедлайн ↑, id ↑ (кортеж, без конкатенации строк)
  const ord=clone(state.requests).sort((a,b)=> (b.priority-a.priority)
    || String(a.deadline||"9999-12-31").localeCompare(String(b.deadline||"9999-12-31"))
    || String(a.id).localeCompare(String(b.id)) );
  // слоты исполнителей
  const slots=[], slotRank=[];
  [...pool].sort((x,y)=>String(x.id).localeCompare(String(y.id))).forEach(e=>{
    for(let k=0;k<e.capacity-e.current_load;k++){ slots.push(e); slotRank.push(k); } });

  const A=[],U=[];
  if(!slots.length){ ord.forEach(r=>U.push({request_id:r.id,request_title:r.title,reason:explainNo(r,pool)})); return {assignments:A,unassigned:U,matched:0,total}; }

  const BIG=1e6; const cand={}; const cost=[];
  ord.forEach((r,ri)=>{
    const pr=Number(r.priority)||3; const pmul=1+(pr-1)*0.5;
    // сначала пробуем строгое покрытие; если у заявки НИ ОДНОГО строгого кандидата — разрешаем частичное
    const hasStrict=pool.some(e=>score(e,r,false,maxCap));
    const row=slots.map((e,sj)=>{
      const c=score(e,r,!hasStrict,maxCap);
      if(!c) return BIG;
      cand[ri+"_"+sj]=c;
      return -c.score*pmul + slotRank[sj]*0.01; // штраф за концентрацию -> разнос по людям
    });
    cost.push(row);
  });

  const sol=hungarian(cost); const usedSlot=new Set();
  ord.forEach((r,ri)=>{
    const sj=sol[ri]; const c=(sj!==-1)?cand[ri+"_"+sj]:null;
    if(!c||usedSlot.has(sj)){ U.push({request_id:r.id,request_title:r.title,reason:explainNo(r,pool)}); return; }
    usedSlot.add(sj);
    const reasons=[...c.reasons];
    if((Number(r.priority)||3)>=4) reasons.push(`Заявка высокого приоритета (${r.priority}/5) — учтена с повышенным весом`);
    if(c.partial) reasons.push("Назначение с допуском частичного покрытия (точного исполнителя нет)");
    // «почему именно этот»: сравнение с лучшим альтернативным слотом ДРУГОГО эксперта
    const alts=slots.map((e,k)=>({e,k,c:cand[ri+"_"+k]})).filter(x=>x.c&&x.e.id!==c.e.id);
    if(alts.length){ alts.sort((p,q)=>q.c.score-p.c.score); const s2=alts[0];
      const diff=Math.round((c.score-s2.c.score)*10)/10;
      let why;
      if(Math.abs(diff)<1) why=`Минимальное преимущество (${diff} б.) перед ${s2.e.name} — выбран по балансу нагрузки`;
      else if(c.e.rating>s2.e.rating) why=`Преимущество по рейтингу (${c.e.rating} против ${s2.e.rating}) перед ${s2.e.name}`;
      else why=`Лучшее соответствие (${c.score} против ${s2.c.score}) по сравнению с ${s2.e.name}`;
      reasons.push(why); }
    A.push({request_id:r.id,request_title:r.title,expert_id:c.e.id,expert_name:c.e.name,score:c.score,partial:c.partial,reasons});
  });
  return {assignments:A,unassigned:U,matched:A.length,total}; }

/* ---- рендер ---- */
function setCounts(){ $("#cntReq").textContent=state.requests.length; $("#cntExp").textContent=state.experts.length; const ann=$("#cntAnn"); if(ann) ann.textContent=(state.announcements||[]).length; }
function buildGuide(){ const g=$("#guide"); if(!g||g.dataset.built) return; g.dataset.built="1";
  g.innerHTML=`<div class="hd">Как это работает</div><div class="steps"><div class="step"><b>1.</b> Добавь <a data-go="requests">заявки</a> — что нужно сделать (с навыками)</div><div class="step"><b>2.</b> Добавь <a data-go="experts">экспертов</a> — кто может это сделать</div><div class="step"><b>3.</b> Система сама назначает лучшего — результат ниже ↓</div></div>`;
  g.querySelectorAll("[data-go]").forEach(a=>a.onclick=()=>document.querySelector(`nav.tabs button[data-tab="${a.dataset.go}"]`).click()); }
/* ручные назначения «перебивают» авто: убираем их из unassigned/auto */
function combinedResult(){
  const r=assignAll();
  const manual=(state.manualAssignments||[]).filter(m=>state.requests.some(q=>q.id===m.request_id));
  const manualIds=new Set(manual.map(m=>m.request_id));
  const assignments=r.assignments.filter(a=>!manualIds.has(a.request_id))
    .concat(manual.map(m=>({...m,score:null,manual:true})));
  const unassigned=r.unassigned.filter(u=>!manualIds.has(u.request_id));
  return {assignments,unassigned,total:r.total,matched:assignments.length}; }

function dashboard(){ buildGuide(); setCounts(); const r=combinedResult();
  const ld={}; state.experts.forEach(e=>ld[e.id]=0); r.assignments.forEach(a=>{ if(a.expert_id in ld) ld[a.expert_id]++; });
  $("#matched").textContent=r.matched; $("#total").textContent=r.total; $("#rate").textContent=r.total?Math.round(r.matched/r.total*100)+"%":"—";
  // метрики эффекта (п.3)
  const manualCount=r.assignments.filter(a=>a.manual).length;
  $("#metrics").innerHTML=`
    <div class="metric"><div class="metric-val">${r.matched}</div><div class="metric-label">Назначено из ${r.total}</div></div>
    <div class="metric"><div class="metric-val">${r.matched?"&lt; 1 сек":"—"}</div><div class="metric-label">Время распределения</div></div>
    <div class="metric"><div class="metric-val">${manualCount}</div><div class="metric-label">Ручных операций</div></div>
    <div class="metric"><div class="metric-val">${r.total?Math.round(r.matched/r.total*100)+"%":"—"}</div><div class="metric-label">Покрытие заявок</div></div>`;
  $("#mentors").innerHTML=state.experts.map(e=>`<div class="mentor"><div class="row"><span>${esc(e.name)} <span class="role">· ${esc(e.role)}</span></span><span>${ld[e.id]}/${e.capacity}</span></div><div class="bar"><i data-w="${Math.min(ld[e.id]/e.capacity,1)}"></i></div></div>`).join("")||'<p class="empty">Нет исполнителей.</p>';
  requestAnimationFrame(()=>document.querySelectorAll(".bar > i").forEach(i=>i.style.transform=`scaleX(${i.dataset.w})`));
  $("#assignments").innerHTML=r.assignments.map(a=>{
    const cls=a.manual?"item manual":(a.partial?"item partial":"item");
    const badge=a.manual?'<span class="pill man">ручное</span>':(a.partial?'<span class="pill warn">частично</span>':(a.reasons.some(x=>x.includes("приоритет"))?'<span class="pill hi">приоритет</span>':""));
    const sc=a.manual?"✋":Math.round(a.score);
    return `<article class="${cls}"><div class="score">${sc}</div><div><h3>${esc(a.request_title)} ${badge}</h3><div class="who">→ <b>${esc(a.expert_name)}</b></div><ul class="reasons">${a.reasons.map(x=>`<li class="${x.startsWith("⚠")?"warn":""}">${esc(x)}</li>`).join("")}</ul></div></article>`;
  }).join("")||'<p class="empty">Заявок нет — добавь во вкладке «Заявки».</p>';
  $("#unassignedCard").classList.toggle("hidden",r.unassigned.length===0);
  $("#unassigned").innerHTML=r.unassigned.map(x=>`<div class="u"><span class="x">✗</span><span class="grow">${esc(x.request_title)} — <em>${esc(x.reason)}</em></span><button class="btn tiny" data-manual="${esc(x.request_id)}">Назначить вручную</button></div>`).join("");
  document.querySelectorAll("[data-manual]").forEach(b=>b.onclick=()=>openManual(b.dataset.manual)); }

/* ---- ручное назначение (п.1): модалка выбора эксперта ---- */
function openManual(reqId){
  const req=state.requests.find(r=>r.id===reqId); if(!req) return;
  const free=state.experts.filter(e=>e.available&&e.current_load<e.capacity);
  if(!free.length){ notify("Нет доступных исполнителей со свободной ёмкостью"); return; }
  const bg=document.createElement("div"); bg.className="modal-bg";
  bg.innerHTML=`<div class="modal"><h3>Ручное назначение</h3><div class="sub">${esc(req.title)} — выбери исполнителя</div>
    ${free.map(e=>`<button class="pick" data-e="${esc(e.id)}"><div class="av">${esc(e.name.slice(0,1))}</div><div class="pmeta"><b>${esc(e.name)}</b><div class="ps">${esc(e.role)} · ★${e.rating} · загрузка ${e.current_load}/${e.capacity} · ${esc(skillStr(e.skills))||"без навыков"}</div></div></button>`).join("")}
    <button class="btn close">Отмена</button></div>`;
  const close=()=>bg.remove();
  bg.addEventListener("click",ev=>{ if(ev.target===bg) close(); });
  bg.querySelector(".close").onclick=close;
  bg.querySelectorAll(".pick").forEach(p=>p.onclick=()=>{
    const e=state.experts.find(x=>x.id===p.dataset.e);
    state.manualAssignments=(state.manualAssignments||[]).filter(m=>m.request_id!==reqId);
    state.manualAssignments.push({request_id:reqId,request_title:req.title,expert_id:e.id,expert_name:e.name,reasons:["Назначено вручную координатором (авто-покрытие невозможно)"]});
    save(); close(); dashboard(); notify(`${e.name} назначен(а) вручную`,true);
  });
  document.body.appendChild(bg); }
