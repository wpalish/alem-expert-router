<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alem Expert Router — панель распределения</title>
<style>
  :root {
    --bg: oklch(98% 0.005 250);
    --surface: oklch(100% 0 0);
    --ink: oklch(22% 0.02 265);
    --muted: oklch(55% 0.02 265);
    --line: oklch(92% 0.01 265);
    --accent: oklch(55% 0.16 265);
    --accent-soft: oklch(96% 0.03 265);
    --ok: oklch(62% 0.15 150);
    --warn: oklch(70% 0.15 55);
    --radius: 14px;
    --shadow: 0 1px 2px oklch(0% 0 0 / 0.04), 0 8px 24px oklch(0% 0 0 / 0.06);
    --space: clamp(1rem, 0.6rem + 1.5vw, 2rem);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); line-height: 1.5; }

  header.top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; padding: var(--space); border-bottom: 1px solid var(--line);
    background: var(--surface); flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 0.7rem; }
  .logo {
    width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center;
    background: linear-gradient(135deg, var(--accent), oklch(60% 0.18 295));
    color: #fff; font-weight: 800; font-size: 1.1rem;
  }
  .brand h1 { font-size: 1.05rem; margin: 0; letter-spacing: -0.01em; }
  .brand p { margin: 0; font-size: 0.8rem; color: var(--muted); }
  .actions { display: flex; gap: 0.6rem; }
  button {
    font: inherit; font-weight: 600; cursor: pointer; border-radius: 10px;
    padding: 0.6rem 1rem; border: 1px solid var(--line); background: var(--surface);
    color: var(--ink); transition: transform var(--ease) 150ms, box-shadow var(--ease) 150ms, background 150ms;
  }
  button:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  button:active { transform: translateY(0); }
  button.primary { background: var(--accent); color: #fff; border-color: transparent; }

  main { max-width: 1100px; margin: 0 auto; padding: var(--space); display: grid;
    grid-template-columns: 320px 1fr; gap: var(--space); align-items: start; }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); }
  .card h2 { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 0; padding: 1rem 1.1rem 0.4rem; }

  .stats { display: flex; gap: 0.8rem; padding: 0.6rem 1.1rem 1.1rem; }
  .stat { flex: 1; }
  .stat b { display: block; font-size: 1.9rem; letter-spacing: -0.02em; line-height: 1.1; }
  .stat span { font-size: 0.78rem; color: var(--muted); }

  .mentor { padding: 0.5rem 1.1rem; }
  .mentor:last-child { padding-bottom: 1.1rem; }
  .mentor .row { display: flex; justify-content: space-between; align-items: baseline;
    font-size: 0.9rem; margin-bottom: 0.3rem; }
  .mentor .role { font-size: 0.72rem; color: var(--muted); }
  .bar { height: 8px; background: var(--accent-soft); border-radius: 99px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 99px;
    transform-origin: left; transform: scaleX(0); transition: transform 700ms var(--ease); }

  .assign { padding: 0.4rem 0.6rem 1rem; }
  .item { display: grid; grid-template-columns: auto 1fr; gap: 0.9rem;
    padding: 0.9rem 0.6rem; border-bottom: 1px solid var(--line); }
  .item:last-child { border-bottom: 0; }
  .score { width: 52px; height: 52px; border-radius: 12px; display: grid; place-items: center;
    background: var(--accent-soft); color: var(--accent); font-weight: 800; font-size: 1.05rem; }
  .item h3 { margin: 0 0 0.15rem; font-size: 1rem; letter-spacing: -0.01em; }
  .who { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.45rem; }
  .who b { color: var(--ink); }
  .reasons { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.2rem; }
  .reasons li { font-size: 0.82rem; color: var(--muted); padding-left: 1.1rem; position: relative; }
  .reasons li::before { content: "✓"; position: absolute; left: 0; color: var(--ok); font-weight: 700; }

  .pill { font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 99px; }
  .pill.hi { background: oklch(95% 0.05 55); color: var(--warn); }

  .unassigned { padding: 0.4rem 1.1rem 1.1rem; }
  .unassigned .u { display: flex; gap: 0.6rem; align-items: baseline; font-size: 0.86rem;
    padding: 0.4rem 0; border-bottom: 1px dashed var(--line); }
  .unassigned .u:last-child { border-bottom: 0; }
  .unassigned .u .x { color: var(--warn); font-weight: 800; }
  .unassigned .u em { color: var(--muted); font-style: normal; }
  .empty { padding: 2rem; text-align: center; color: var(--muted); }
</style>
</head>
<body>
  <header class="top">
    <div class="brand">
      <div class="logo">A</div>
      <div>
        <h1>Alem Expert Router</h1>
        <p>Умное распределение экспертов · менторов · фрилансеров</p>
      </div>
    </div>
    <div class="actions">
      <button id="seed">Загрузить демо</button>
      <button id="run" class="primary">Запустить распределение</button>
    </div>
  </header>

  <main>
    <aside style="display:grid; gap: var(--space);">
      <section class="card">
        <h2>Сводка</h2>
        <div class="stats">
          <div class="stat"><b id="matched">—</b><span>назначено</span></div>
          <div class="stat"><b id="total">—</b><span>заявок</span></div>
          <div class="stat"><b id="rate">—</b><span>покрытие</span></div>
        </div>
      </section>
      <section class="card">
        <h2>Загрузка исполнителей</h2>
        <div id="mentors"></div>
      </section>
      <section class="card" id="unassignedCard" hidden>
        <h2>Без исполнителя</h2>
        <div class="unassigned" id="unassigned"></div>
      </section>
    </aside>

    <section class="card">
      <h2>Назначения с объяснением</h2>
      <div class="assign" id="assignments">
        <p class="empty">Нажми «Загрузить демо», затем «Запустить распределение».</p>
      </div>
    </section>
  </main>

<script>
const $ = (s) => document.querySelector(s);

async function loadDashboard() {
  const [dash, assignRes] = await Promise.all([
    fetch("/dashboard").then(r => r.json()),
    fetch("/assign", { method: "POST" }).then(r => r.json()),
  ]);

  $("#matched").textContent = dash.matched;
  $("#total").textContent = dash.total;
  $("#rate").textContent = dash.total ? Math.round(dash.matched / dash.total * 100) + "%" : "—";

  // загрузка исполнителей
  $("#mentors").innerHTML = dash.experts.map(e => `
    <div class="mentor">
      <div class="row"><span>${e.name} <span class="role">· ${e.role}</span></span>
        <span>${e.assigned_now}/${e.capacity}</span></div>
      <div class="bar"><i data-w="${Math.min(e.utilization, 1)}"></i></div>
    </div>`).join("");
  requestAnimationFrame(() => document.querySelectorAll(".bar > i")
    .forEach(i => i.style.transform = `scaleX(${i.dataset.w})`));

  // назначения
  const items = assignRes.assignments.map(a => {
    const hi = a.reasons.find(r => r.includes("приоритет"));
    return `<article class="item">
      <div class="score">${Math.round(a.score)}</div>
      <div>
        <h3>${a.request_title} ${hi ? '<span class="pill hi">приоритет</span>' : ''}</h3>
        <div class="who">→ <b>${a.expert_name}</b></div>
        <ul class="reasons">${a.reasons.map(r => `<li>${r}</li>`).join("")}</ul>
      </div>
    </article>`;
  }).join("");
  $("#assignments").innerHTML = items || '<p class="empty">Нет назначений.</p>';

  // неназначенные
  const u = assignRes.unassigned;
  $("#unassignedCard").hidden = u.length === 0;
  $("#unassigned").innerHTML = u.map(x =>
    `<div class="u"><span class="x">✗</span><span>${x.request_title} — <em>${x.reason}</em></span></div>`
  ).join("");
}

$("#seed").addEventListener("click", async () => {
  await fetch("/seed", { method: "POST" });
  await loadDashboard();
});
$("#run").addEventListener("click", loadDashboard);

// автозагрузка демо при первом открытии
(async () => { await fetch("/seed", { method: "POST" }); await loadDashboard(); })();
</script>
</body>
</html>
