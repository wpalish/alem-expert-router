<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alem Expert Router</title>
<style>
  :root {
    --bg: oklch(98% 0.005 265); --surface: oklch(100% 0 0);
    --ink: oklch(22% 0.03 265); --muted: oklch(55% 0.02 265);
    --line: oklch(91% 0.012 265); --accent: oklch(55% 0.18 277);
    --accent-d: oklch(48% 0.2 277); --soft: oklch(96% 0.03 277);
    --ok: oklch(60% 0.15 150); --ok-soft: oklch(95% 0.05 150);
    --warn: oklch(70% 0.15 55); --warn-soft: oklch(96% 0.05 60);
    --danger: oklch(58% 0.2 25);
    --radius: 14px; --shadow: 0 1px 2px oklch(0% 0 0/.04), 0 10px 26px oklch(0% 0 0/.06);
    --ease: cubic-bezier(.16,1,.3,1);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); line-height: 1.5; }
  h1,h2,h3 { letter-spacing: -.01em; }

  header.top { position: sticky; top: 0; z-index: 5; display: flex; align-items: center;
    gap: 1.2rem; padding: .8rem 1.4rem; background: oklch(100% 0 0/.85);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: .6rem; margin-right: .4rem; }
  .logo { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center;
    background: linear-gradient(135deg, var(--accent), oklch(58% .19 300)); color: #fff;
    font-weight: 800; }
  .brand b { font-size: 1rem; }
  nav.tabs { display: flex; gap: .25rem; }
  nav.tabs button { font: inherit; font-weight: 600; border: 0; background: transparent;
    color: var(--muted); padding: .5rem .9rem; border-radius: 9px; cursor: pointer;
    transition: background 150ms, color 150ms; }
  nav.tabs button:hover { background: var(--soft); color: var(--ink); }
  nav.tabs button.on { background: var(--accent); color: #fff; }
  .spacer { flex: 1; }

  button.btn { font: inherit; font-weight: 600; cursor: pointer; border-radius: 10px;
    padding: .55rem 1rem; border: 1px solid var(--line); background: var(--surface);
    color: var(--ink); transition: transform var(--ease) 150ms, box-shadow 150ms, background 150ms; }
  button.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  button.btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
  button.btn.ai { background: var(--soft); color: var(--accent-d); border-color: transparent; }
  button.btn.sm { padding: .35rem .7rem; font-size: .82rem; border-radius: 8px; }

  main { max-width: 1140px; margin: 0 auto; padding: 1.4rem; }
  .card { background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); }
  .card h2 { font-size: .78rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin: 0; padding: 1rem 1.1rem .3rem; }

  /* --- распределение --- */
  .grid { display: grid; grid-template-columns: 320px 1fr; gap: 1.4rem; align-items: start; }
  @media (max-width: 860px){ .grid{ grid-template-columns: 1fr; } }
  .stats { display: flex; gap: .8rem; padding: .5rem 1.1rem 1.1rem; }
  .stat b { display: block; font-size: 1.9rem; line-height: 1.1; }
  .stat span { font-size: .76rem; color: var(--muted); }
  .mentor { padding: .45rem 1.1rem; }
  .mentor:last-child { padding-bottom: 1rem; }
  .mentor .row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: .28rem; }
  .mentor .role { font-size: .72rem; color: var(--muted); }
  .bar { height: 8px; background: var(--soft); border-radius: 99px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 99px;
    transform-origin: left; transform: scaleX(0); transition: transform 700ms var(--ease); }
  .assign { padding: .3rem .6rem 1rem; }
  .item { display: grid; grid-template-columns: auto 1fr; gap: .9rem; padding: .85rem .6rem;
    border-bottom: 1px solid var(--line); }
  .item:last-child { border-bottom: 0; }
  .score { width: 50px; height: 50px; border-radius: 12px; display: grid; place-items: center;
    background: var(--soft); color: var(--accent-d); font-weight: 800; }
  .item h3 { margin: 0 0 .12rem; font-size: 1rem; }
  .who { font-size: .85rem; color: var(--muted); margin-bottom: .4rem; }
  .who b { color: var(--ink); }
  .reasons { list-style: none; margin: 0; padding: 0; display: grid; gap: .18rem; }
  .reasons li { font-size: .82rem; color: var(--muted); padding-left: 1.1rem; position: relative; }
  .reasons li::before { content: "✓"; position: absolute; left: 0; color: var(--ok); font-weight: 700; }
  .pill { font-size: .68rem; font-weight: 700; padding: .12rem .5rem; border-radius: 99px; }
  .pill.hi { background: var(--warn-soft); color: var(--warn); }
  .unassigned { padding: .3rem 1.1rem 1.1rem; }
  .u { display: flex; gap: .5rem; font-size: .85rem; padding: .35rem 0; border-bottom: 1px dashed var(--line); }
  .u:last-child { border-bottom: 0; } .u .x { color: var(--warn); font-weight: 800; }
  .u em { color: var(--muted); font-style: normal; }

  /* --- списки/формы --- */
  .split { display: grid; grid-template-columns: 380px 1fr; gap: 1.4rem; align-items: start; }
  @media (max-width: 860px){ .split{ grid-template-columns: 1fr; } }
  form { padding: .4rem 1.1rem 1.1rem; display: grid; gap: .7rem; }
  label { font-size: .8rem; font-weight: 600; color: var(--muted); display: grid; gap: .3rem; }
  input, select, textarea { font: inherit; padding: .55rem .7rem; border: 1px solid var(--line);
    border-radius: 10px; background: var(--surface); color: var(--ink); width: 100%; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--soft); border-color: var(--accent); }
  textarea { resize: vertical; min-height: 64px; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
  .chips { display: flex; flex-wrap: wrap; gap: .35rem; min-height: 1.4rem; }
  .chip { font-size: .78rem; font-weight: 600; padding: .2rem .55rem; border-radius: 99px;
    background: var(--soft); color: var(--accent-d); }
  .method { font-size: .72rem; color: var(--muted); }
  .picker { display: grid; gap: .6rem; }
  .palette { display: flex; flex-wrap: wrap; gap: .4rem; }
  .sk { font: inherit; font-size: .85rem; font-weight: 600; padding: .5rem .8rem; border-radius: 99px;
    border: 1px solid var(--line); background: var(--surface); color: var(--muted); cursor: pointer;
    transition: background 120ms, color 120ms; }
  .sk.on { background: var(--accent); color: #fff; border-color: transparent; }
  .chosen { display: grid; gap: .45rem; }
  .ch { display: flex; align-items: center; gap: .6rem; padding: .45rem .6rem; background: var(--soft);
    border-radius: 11px; flex-wrap: wrap; }
  .ch > span { font-weight: 700; font-size: .88rem; color: var(--ink); min-width: 86px; }
  .lv { display: flex; gap: .3rem; }
  .dot { width: 26px; height: 26px; border-radius: 7px; border: 1px solid var(--line);
    background: var(--surface); cursor: pointer; padding: 0; font-size: .7rem; color: var(--muted); }
  .dot.f { background: var(--accent); border-color: transparent; color: #fff; }
  .ch .rm { margin-left: auto; color: var(--danger); background: 0; border: 0; cursor: pointer; font-size: 1rem; }
  .list { display: grid; gap: .7rem; }
  .row-card { display: flex; align-items: center; gap: .9rem; padding: .85rem 1rem;
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px; }
  .row-card .av { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center;
    background: var(--soft); color: var(--accent-d); font-weight: 800; flex: none; }
  .row-card .meta { flex: 1; min-width: 0; }
  .row-card .meta b { font-size: .98rem; }
  .row-card .meta .sub { font-size: .8rem; color: var(--muted); }
  .del { color: var(--danger); background: transparent; border: 0; cursor: pointer; font-size: 1.1rem;
    padding: .2rem .4rem; border-radius: 8px; }
  .del:hover { background: oklch(95% .04 25); }
  .empty { padding: 1.4rem; text-align: center; color: var(--muted); }
  .row-card { transition: transform var(--ease) 150ms, box-shadow var(--ease) 150ms; }
  .row-card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  #toast.toast { position: fixed; left: 50%; bottom: 1.5rem; transform: translate(-50%, 2rem);
    padding: .7rem 1.2rem; border-radius: 12px; font-weight: 600; font-size: .9rem; color: #fff;
    box-shadow: var(--shadow); opacity: 0; pointer-events: none; z-index: 50;
    transition: opacity 280ms var(--ease), transform 280ms var(--ease); }
  #toast.toast.show { opacity: 1; transform: translate(-50%, 0); }
  #toast.toast.err { background: var(--danger); }
  #toast.toast.ok { background: var(--ok); }
  .brand .tag { font-size: .72rem; color: var(--muted); font-weight: 500; margin-top: 1px; }
  nav.tabs .cnt { display: inline-grid; place-items: center; min-width: 1.2rem; height: 1.2rem;
    padding: 0 .35rem; margin-left: .25rem; border-radius: 99px; font-size: .72rem;
    background: var(--soft); color: var(--accent-d); }
  nav.tabs button.on .cnt { background: oklch(100% 0 0 / .25); color: #fff; }
  .guide { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 1rem 1.2rem; margin-bottom: 1.4rem; }
  .guide .hd { font-weight: 700; font-size: .95rem; margin-bottom: .55rem; }
  .guide .steps { display: flex; gap: 1rem; flex-wrap: wrap; }
  .guide .step { flex: 1; min-width: 210px; font-size: .88rem; color: var(--muted); }
  .guide .step b { color: var(--accent-d); margin-right: .15rem; }
  .guide a { color: var(--accent); font-weight: 600; cursor: pointer; text-decoration: none; }
  .guide a:hover { text-decoration: underline; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <header class="top">
    <div class="brand"><div class="logo">A</div><div><b>Alem Expert Router</b><div class="tag">Автоматическое распределение заявок по исполнителям</div></div></div>
    <nav class="tabs">
      <button data-tab="assign" class="on">Распределение</button>
      <button data-tab="requests">Заявки <span class="cnt" id="cntReq"></span></button>
      <button data-tab="experts">Эксперты <span class="cnt" id="cntExp"></span></button>
    </nav>
    <div class="spacer"></div>
    <button class="btn sm" id="seedBtn">Демо-данные</button>
  </header>

  <main>
    <!-- ===== РАСПРЕДЕЛЕНИЕ ===== -->
    <section id="view-assign">
      <div id="guide" class="guide"></div>
      <div class="grid">
      <aside style="display:grid; gap:1.4rem;">
        <section class="card"><h2>Сводка</h2>
          <div class="stats">
            <div class="stat"><b id="matched">—</b><span>назначено</span></div>
            <div class="stat"><b id="total">—</b><span>заявок</span></div>
            <div class="stat"><b id="rate">—</b><span>покрытие</span></div>
          </div>
        </section>
        <section class="card"><h2>Загрузка исполнителей</h2><div id="mentors"></div></section>
        <section class="card hidden" id="unassignedCard"><h2>Без исполнителя</h2>
          <div class="unassigned" id="unassigned"></div></section>
      </aside>
      <section class="card"><h2>Назначения с объяснением</h2>
        <div class="assign" id="assignments"></div></section>
      </div>
    </section>

    <!-- ===== ЗАЯВКИ ===== -->
    <section id="view-requests" class="split hidden">
      <section class="card"><h2>Новая заявка</h2>
        <form id="reqForm">
          <label>Название
            <input id="rTitle" required placeholder="Чат-бот поддержки студентов" /></label>
          <label>Опиши задачу словами — AI извлечёт компетенции
            <textarea id="rText" placeholder="Нужен ассистент по базе знаний на Python с элементами ML…"></textarea></label>
          <button type="button" class="btn ai" id="parseBtn">🪄 Извлечь компетенции (AI)</button>
          <div class="method" id="rMethod"></div>
          <label>Требуемые компетенции — нажми, чтобы выбрать
            <div class="picker" id="rPicker"></div></label>
          <label>Приоритет
            <select id="rPriority">
              <option value="5">5 — наивысший</option><option value="4">4 — высокий</option>
              <option value="3" selected>3 — средний</option><option value="2">2 — низкий</option>
              <option value="1">1 — минимальный</option>
            </select></label>
          <button class="btn primary" type="submit">Добавить заявку</button>
        </form>
      </section>
      <section class="card"><h2>Заявки</h2><div class="list" id="reqList" style="padding:.4rem 1.1rem 1.1rem"></div></section>
    </section>

    <!-- ===== ЭКСПЕРТЫ ===== -->
    <section id="view-experts" class="split hidden">
      <section class="card"><h2>Новый исполнитель</h2>
        <form id="expForm">
          <label>Имя <input id="eName" required placeholder="Айгерим" /></label>
          <label>Роль
            <select id="eRole"><option value="expert">эксперт</option>
              <option value="mentor">ментор</option><option value="freelancer">фрилансер</option></select></label>
          <div class="two">
            <label>Ёмкость <input id="eCap" type="number" min="1" value="3" /></label>
            <label>Рейтинг <input id="eRating" type="number" min="0" max="5" step="0.1" value="4.5" /></label>
          </div>
          <label>Навыки — нажми, чтобы выбрать
            <div class="picker" id="ePicker"></div></label>
          <button class="btn primary" type="submit">Добавить исполнителя</button>
        </form>
      </section>
      <section class="card"><h2>Исполнители</h2><div class="list" id="expList" style="padding:.4rem 1.1rem 1.1rem"></div></section>
    </section>
  </main>

<script>
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const api = {
  get: (u) => fetch(u).then(r => r.json()),
  post: async (u, b) => {
    const r = await fetch(u, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(b) });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.detail || ("ошибка " + r.status));
    return d;
  },
  del: (u) => fetch(u, { method:"DELETE" }).then(r => r.json()),
};
const parseSkills = (str) => {
  const out = {};
  (str || "").split(",").forEach(p => {
    const m = p.trim().match(/^(.+?)\s*[:=]\s*(\d)$/);
    if (m) { const lvl = +m[2]; if (lvl >= 1) out[m[1].trim().toLowerCase()] = Math.min(5, lvl); }
  });
  return out;
};
const uid = (p) => p + (crypto.randomUUID ? crypto.randomUUID().slice(0, 8) : Date.now().toString(36));
function notify(msg, ok = false) {
  let n = document.getElementById("toast");
  if (!n) { n = document.createElement("div"); n.id = "toast"; document.body.appendChild(n); }
  n.textContent = msg; n.className = "toast " + (ok ? "ok" : "err");
  requestAnimationFrame(() => n.classList.add("show"));
  clearTimeout(n._t); n._t = setTimeout(() => n.classList.remove("show"), 2800);
}
const skillStr = (sk) => Object.entries(sk).map(([k,v]) => `${k} ${v}`).join(" · ");

/* ---- пикер навыков (кнопки + уровни 1..5) ---- */
const SKILLS = ["python","fastapi","django","react","typescript","sql","ml","data","nlp","devops","docker","flutter","ui"];
function makePicker(id){
  const state = {}; const el = document.getElementById(id);
  function render(){
    el.innerHTML = `<div class="palette">${SKILLS.map(s=>`<button type="button" class="sk${s in state?" on":""}" data-s="${s}">${s}</button>`).join("")}</div>`
      + (Object.keys(state).length ? `<div class="chosen">${Object.entries(state).map(([s,l])=>`<div class="ch"><span>${esc(s)}</span><div class="lv">${[1,2,3,4,5].map(n=>`<button type="button" class="dot${n<=l?" f":""}" data-s="${s}" data-l="${n}">${n}</button>`).join("")}</div><button type="button" class="rm" data-rm="${s}">✕</button></div>`).join("")}</div>` : "");
    el.querySelectorAll(".sk").forEach(b=>b.onclick=()=>{ const s=b.dataset.s; (s in state)?delete state[s]:state[s]=3; render(); });
    el.querySelectorAll(".dot").forEach(b=>b.onclick=()=>{ state[b.dataset.s]=+b.dataset.l; render(); });
    el.querySelectorAll(".rm").forEach(b=>b.onclick=()=>{ delete state[b.dataset.rm]; render(); });
  }
  render();
  return { get:()=>({...state}), set:o=>{ for(const k in state) delete state[k]; Object.assign(state,o); render(); }, clear:()=>{ for(const k in state) delete state[k]; render(); } };
}
const reqPicker = makePicker("rPicker");
const expPicker = makePicker("ePicker");

/* ---- вкладки ---- */
document.querySelectorAll("nav.tabs button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll("nav.tabs button").forEach(x => x.classList.toggle("on", x === b));
  ["assign","requests","experts"].forEach(t => $("#view-"+t).classList.toggle("hidden", t !== b.dataset.tab));
  if (b.dataset.tab === "assign") loadDashboard();
  if (b.dataset.tab === "requests") loadRequests();
  if (b.dataset.tab === "experts") loadExperts();
}));

/* ---- распределение ---- */
function buildGuide() {
  const g = $("#guide"); if (!g || g.dataset.built) return; g.dataset.built = "1";
  g.innerHTML = `<div class="hd">Как это работает</div><div class="steps">
    <div class="step"><b>1.</b> Добавь <a data-go="requests">заявки</a> — что нужно сделать (с навыками)</div>
    <div class="step"><b>2.</b> Добавь <a data-go="experts">экспертов</a> — кто может это сделать</div>
    <div class="step"><b>3.</b> Система сама назначает лучшего — результат ниже ↓</div></div>`;
  g.querySelectorAll("[data-go]").forEach(a => a.onclick = () =>
    document.querySelector(`nav.tabs button[data-tab="${a.dataset.go}"]`).click());
}
async function loadDashboard() {
  const d = await api.get("/dashboard");
  buildGuide();
  $("#cntReq").textContent = d.total; $("#cntExp").textContent = d.experts.length;
  $("#matched").textContent = d.matched; $("#total").textContent = d.total;
  $("#rate").textContent = d.total ? Math.round(d.matched/d.total*100)+"%" : "—";
  $("#mentors").innerHTML = d.experts.map(e => `
    <div class="mentor"><div class="row"><span>${esc(e.name)} <span class="role">· ${esc(e.role)}</span></span>
      <span>${e.assigned_now}/${e.capacity}</span></div>
      <div class="bar"><i data-w="${Math.min(e.utilization,1)}"></i></div></div>`).join("")
    || '<p class="empty">Нет исполнителей.</p>';
  requestAnimationFrame(() => document.querySelectorAll(".bar > i").forEach(i => i.style.transform = `scaleX(${i.dataset.w})`));
  $("#assignments").innerHTML = d.assignments.map(a => `
    <article class="item"><div class="score">${Math.round(a.score)}</div>
      <div><h3>${esc(a.request_title)} ${a.reasons.some(r=>r.includes("приоритет"))?'<span class="pill hi">приоритет</span>':""}</h3>
        <div class="who">→ <b>${esc(a.expert_name)}</b></div>
        <ul class="reasons">${a.reasons.map(r=>`<li>${esc(r)}</li>`).join("")}</ul></div></article>`).join("")
    || '<p class="empty">Заявок пока нет — добавь во вкладке «Заявки».</p>';
  $("#unassignedCard").classList.toggle("hidden", d.unassigned.length === 0);
  $("#unassigned").innerHTML = d.unassigned.map(x =>
    `<div class="u"><span class="x">✗</span><span>${esc(x.request_title)} — <em>${esc(x.reason)}</em></span></div>`).join("");
}

/* ---- заявки ---- */
let aiSkills = {};
async function loadRequests() {
  const rs = await api.get("/requests");
  $("#cntReq").textContent = rs.length;
  $("#reqList").innerHTML = rs.map(r => `
    <div class="row-card"><div class="av">P${r.priority}</div>
      <div class="meta"><b>${esc(r.title)}</b><div class="sub">${esc(skillStr(r.required_skills)) || "без навыков"}</div></div>
      <button class="del" data-del-req="${esc(r.id)}" title="Удалить">✕</button></div>`).join("")
    || '<p class="empty">Заявок нет.</p>';
  document.querySelectorAll("[data-del-req]").forEach(b => b.onclick = async () => {
    await api.del("/requests/" + encodeURIComponent(b.dataset.delReq)); loadRequests();
  });
}
$("#parseBtn").addEventListener("click", async () => {
  const text = $("#rText").value.trim();
  if (!text) { notify("Сначала опиши задачу словами"); return; }
  $("#parseBtn").textContent = "⏳ Анализирую…";
  try {
    const res = await api.post("/requests/parse", { text });
    reqPicker.set(res.skills || {});
    $("#rMethod").textContent = Object.keys(res.skills || {}).length
      ? (res.method === "llm" ? "🤖 AI распознал — проверь и поправь кнопками" : "🔑 распознано по ключевым словам — поправь кнопками")
      : "навыки не распознаны — выбери кнопками ниже";
  } catch (err) { notify("AI недоступен: " + err.message); }
  $("#parseBtn").textContent = "🪄 Извлечь компетенции (AI)";
});
$("#reqForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const skills = reqPicker.get();
  if (!Object.keys(skills).length) { notify("Выбери хотя бы одну компетенцию — кнопки ниже"); return; }
  try {
    await api.post("/requests", {
      id: uid("r"), title: $("#rTitle").value.trim(),
      description: $("#rText").value.trim(), required_skills: skills,
      priority: +$("#rPriority").value,
    });
    e.target.reset(); reqPicker.clear(); $("#rMethod").textContent = "";
    notify("Заявка добавлена", true); loadRequests();
  } catch (err) { notify("Не удалось: " + err.message); }
});

/* ---- эксперты ---- */
async function loadExperts() {
  const es = await api.get("/experts");
  $("#cntExp").textContent = es.length;
  $("#expList").innerHTML = es.map(e => `
    <div class="row-card"><div class="av">${esc(e.name.slice(0,1))}</div>
      <div class="meta"><b>${esc(e.name)}</b> <span class="role" style="font-size:.78rem;color:var(--muted)">· ${esc(e.role)} · ★${e.rating}</span>
        <div class="sub">${esc(skillStr(e.skills))} · ёмкость ${e.capacity}</div></div>
      <button class="del" data-del-exp="${esc(e.id)}" title="Удалить">✕</button></div>`).join("")
    || '<p class="empty">Исполнителей нет.</p>';
  document.querySelectorAll("[data-del-exp]").forEach(b => b.onclick = async () => {
    await api.del("/experts/" + encodeURIComponent(b.dataset.delExp)); loadExperts();
  });
}
$("#expForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const skills = expPicker.get();
  if (!Object.keys(skills).length) { notify("Выбери навыки исполнителя — кнопки ниже"); return; }
  try {
    await api.post("/experts", {
      id: uid("e"), name: $("#eName").value.trim(), role: $("#eRole").value,
      skills, capacity: +$("#eCap").value, rating: +$("#eRating").value,
    });
    e.target.reset(); expPicker.clear(); notify("Исполнитель добавлен", true); loadExperts();
  } catch (err) { notify("Не удалось: " + err.message); }
});

/* ---- демо ---- */
$("#seedBtn").addEventListener("click", async () => {
  await api.post("/seed", {});
  const on = document.querySelector("nav.tabs button.on").dataset.tab;
  on === "requests" ? loadRequests() : on === "experts" ? loadExperts() : loadDashboard();
});

loadDashboard();
</script>
</body>
</html>
